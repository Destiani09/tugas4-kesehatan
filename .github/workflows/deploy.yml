name: CI/CD CRUD Kesehatan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup SSH Connection
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy Aplikasi ke AWS EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@54.86.50.166 << 'EOF'
          cd /var/www/tugas4-kesehatan
          git pull origin main
          sudo systemctl restart nginx
          EOF