<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Pasien</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 text-center">Sistem Manajemen Data Pasien</h1>
        
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4" id="formTitle">Tambah Pasien Baru</h2>
            <form id="pasienForm" class="flex flex-col gap-4">
                <input type="hidden" id="pasienId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Pasien</label>
                    <input type="text" id="nama" required class="mt-1 w-full border border-gray-300 p-2 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Umur</label>
                    <input type="number" id="umur" required class="mt-1 w-full border border-gray-300 p-2 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Diagnosa</label>
                    <input type="text" id="diagnosa" required class="mt-1 w-full border border-gray-300 p-2 rounded-md">
                </div>
                <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Simpan Data</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">Daftar Pasien</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead class="bg-blue-50">
                        <tr>
                            <th class="px-4 py-2 text-left">Nama</th>
                            <th class="px-4 py-2 text-left">Umur</th>
                            <th class="px-4 py-2 text-left">Diagnosa</th>
                            <th class="px-4 py-2 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPasien" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let pasiens = JSON.parse(localStorage.getItem('dataPasien')) || [];

        function renderTable() {
            const tbody = document.getElementById('tabelPasien');
            tbody.innerHTML = '';
            pasiens.forEach((p, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">${p.nama}</td>
                        <td class="px-4 py-3">${p.umur} Tahun</td>
                        <td class="px-4 py-3">${p.diagnosa}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="editPasien(${index})" class="bg-yellow-500 text-white px-3 py-1 rounded mr-2 hover:bg-yellow-600">Edit</button>
                            <button onclick="hapusPasien(${index})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('pasienForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('pasienId').value;
            const nama = document.getElementById('nama').value;
            const umur = document.getElementById('umur').value;
            const diagnosa = document.getElementById('diagnosa').value;

            if (id === "") {
                pasiens.push({ nama, umur, diagnosa }); 
            } else {
                pasiens[id] = { nama, umur, diagnosa }; 
                document.getElementById('pasienId').value = "";
                document.getElementById('formTitle').innerText = "Tambah Pasien Baru";
            }

            localStorage.setItem('dataPasien', JSON.stringify(pasiens));
            this.reset();
            renderTable();
        });

        function editPasien(index) {
            document.getElementById('pasienId').value = index;
            document.getElementById('nama').value = pasiens[index].nama;
            document.getElementById('umur').value = pasiens[index].umur;
            document.getElementById('diagnosa').value = pasiens[index].diagnosa;
            document.getElementById('formTitle').innerText = "Edit Data Pasien";
        }

        function hapusPasien(index) {
            if(confirm('Yakin ingin menghapus data pasien ini?')) {
                pasiens.splice(index, 1); 
                localStorage.setItem('dataPasien', JSON.stringify(pasiens));
                renderTable();
            }
        }

        renderTable(); 
    </script>
</body>
</html>
