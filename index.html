<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Pasien - CRUD Kesehatan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-teal-600 mb-6 text-center">Sistem Pusat Informasi Pasien Sehat</h1>
        
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-800" id="formTitle">Tambah Pasien Baru</h2>
            <form id="pasienForm" class="flex flex-col gap-4">
                <input type="hidden" id="pasienId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Pasien</label>
                    <input type="text" id="nama" required class="mt-1 w-full border border-gray-300 p-2 rounded-md focus:ring-teal-500 focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Umur (Tahun)</label>
                    <input type="number" id="umur" required class="mt-1 w-full border border-gray-300 p-2 rounded-md focus:ring-teal-500 focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Diagnosa Penyakit</label>
                    <input type="text" id="diagnosa" required class="mt-1 w-full border border-gray-300 p-2 rounded-md focus:ring-teal-500 focus:border-teal-500">
                </div>
                <button type="submit" class="bg-teal-600 text-white font-bold py-2 px-4 rounded hover:bg-teal-700 transition duration-200">Simpan Data Pasien</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Daftar Pasien Aktif</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead class="bg-teal-50">
                        <tr>
                            <th class="px-4 py-2 text-left text-teal-700 font-semibold">Nama</th>
                            <th class="px-4 py-2 text-left text-teal-700 font-semibold">Umur</th>
                            <th class="px-4 py-2 text-left text-teal-700 font-semibold">Diagnosa</th>
                            <th class="px-4 py-2 text-center text-teal-700 font-semibold">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPasien" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Mengambil data awal dari LocalStorage atau array kosong
        let pasiens = JSON.parse(localStorage.getItem('dataPasien')) || [];

        // Fungsi menampilkan data ke tabel (Read)
        function renderTable() {
            const tbody = document.getElementById('tabelPasien');
            tbody.innerHTML = '';
            pasiens.forEach((p, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-gray-700 font-medium">${p.nama}</td>
                        <td class="px-4 py-3 text-gray-600">${p.umur} Tahun</td>
                        <td class="px-4 py-3 text-gray-600">${p.diagnosa}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="editPasien(${index})" class="bg-amber-500 text-white px-3 py-1 rounded mr-2 hover:bg-amber-600 transition">Edit</button>
                            <button onclick="hapusPasien(${index})" class="bg-rose-500 text-white px-3 py-1 rounded hover:bg-rose-600 transition">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Fungsi Simpan Data (Create & Update)
        document.getElementById('pasienForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('pasienId').value;
            const nama = document.getElementById('nama').value;
            const umur = document.getElementById('umur').value;
            const diagnosa = document.getElementById('diagnosa').value;

            if (id === "") {
                // Tambah data baru (Create)
                pasiens.push({ nama, umur, diagnosa }); 
            } else {
                // Update data lama (Update)
                pasiens[id] = { nama, umur, diagnosa }; 
                document.getElementById('pasienId').value = "";
                document.getElementById('formTitle').innerText = "Tambah Pasien Baru";
            }

            localStorage.setItem('dataPasien', JSON.stringify(pasiens));
            this.reset();
            renderTable();
        });

        // Fungsi memicu mode Edit
        function editPasien(index) {
            document.getElementById('pasienId').value = index;
            document.getElementById('nama').value = pasiens[index].nama;
            document.getElementById('umur').value = pasiens[index].umur;
            document.getElementById('diagnosa').value = pasiens[index].diagnosa;
            document.getElementById('formTitle').innerText = "Edit Data Pasien";
        }

        // Fungsi Hapus Data (Delete)
        function hapusPasien(index) {
            if(confirm('Apakah Anda yakin ingin menghapus data pasien ini?')) {
                pasiens.splice(index, 1); 
                localStorage.setItem('dataPasien', JSON.stringify(pasiens));
                renderTable();
            }
        }

        renderTable(); 
    </script>
</body>
</html>
